<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Laster fast studiested...</title>
  <script>
    // 1. Henter navnet på mappen (f.eks. "NES") fra URL-en
    var pathSegments = window.location.pathname.split('/');
    
    // Henter mappenavnet rett før index.html, uavhengig av skråstreker til slutt
    var mappeNavn = "";
    for (var i = pathSegments.length - 1; i >= 0; i--) {
      if (pathSegments[i] && pathSegments[i] !== "index.html") {
        mappeNavn = pathSegments[i];
        break;
      }
    }
    
    var studiestedKode = mappeNavn.toUpperCase();

    // 2. Hvis vi fant en kode, lagre den og send brukeren til hovedsiden med parameter
    if (studiestedKode) {
      localStorage.setItem('valgtStudiested', studiestedKode);
      window.location.href = "../index.html?sted=" + studiestedKode;
    } else {
      // Sikkerhetsnett hvis noe mot formodning skulle feile med banen
      window.location.href = "../index.html?sted=NES";
    }
  </script>
</head>
<body>
  <p style="font-family:sans-serif; text-align:center; margin-top:20%; color:#002855; font-weight:bold;">
    Laster timeplan for Nesna...
  </p>
</body>
</html>
